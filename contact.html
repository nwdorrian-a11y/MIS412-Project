<h1>Contact Information</h1>

<div class="formBox">

<form id="contactForm">

  <label for="name">Name:</label>
  <input type="text" id="name" name="name" required><br><br>

  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required><br><br>

  <p>What is the purpose of your inquiry:</p>

  <label>
    <input type="radio" name="type" value="comment" required>
    Comment
  </label>

  <label>
    <input type="radio" name="type" value="question">
    Question
  </label>

  <br><br>

  <label for="message">Message:</label>
  <textarea id="message" name="message" required></textarea><br><br>

  <button type="submit">Submit</button>

  <p id="confirmation"></p>

</form>

</div>

<script>

document.getElementById("contactForm").addEventListener("submit", function(event) {
  event.preventDefault();

  document.getElementById("confirmation").textContent = "Message sent successfully!";
  document.getElementById("confirmation").style.color = "green";

  setTimeout(function() {
    document.getElementById("contactForm").reset();
    document.getElementById("confirmation").textContent = "";
  }, 3000);
});

</script>
</body>
